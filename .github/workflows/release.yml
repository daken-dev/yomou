name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter beta
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/daken-android-upload.jks"
          cat > android/key.properties <<EOF
          storeFile=$RUNNER_TEMP/daken-android-upload.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: flutter build apk --release --build-name "${GITHUB_REF_NAME#v}" --build-number "${GITHUB_RUN_NUMBER}"

      - name: Build release app bundle
        run: flutter build appbundle --release --build-name "${GITHUB_REF_NAME#v}" --build-number "${GITHUB_RUN_NUMBER}"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter beta
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build release bundle
        shell: pwsh
        run: |
          $buildName = $env:GITHUB_REF_NAME -replace '^v', ''
          flutter build windows --release --build-name $buildName --build-number $env:GITHUB_RUN_NUMBER

      - name: Package Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/yomou-windows-x64 -Force | Out-Null
          Copy-Item build/windows/x64/runner/Release/* dist/yomou-windows-x64 -Recurse
          Compress-Archive -Path dist/yomou-windows-x64 -DestinationPath dist/yomou-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/yomou-windows-x64.zip

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - android
      - windows

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*-release"
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/app-release.apk
            dist/app-release.aab
            dist/yomou-windows-x64.zip
