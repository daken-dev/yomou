name: yomou
description: "汎用小説リーダー"
publish_to: "none"
version: 0.0.5

environment:
  sdk: ^3.12.0-210.2.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  kumihan: ^0.0.3
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  dio: ^5.9.2
  html: ^0.15.6
  path: ^1.9.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  sqlite3: ^3.2.0
  sqlite3_flutter_libs: ^0.6.0+eol
  archive: ^4.0.9
  csv: ^8.0.0
  jis0208: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/paper_textures/03.jpg
  fonts:
    - family: LineSeedJP
      fonts:
        - asset: assets/fonts/LINESeedJP_A_TTF_Rg.ttf
          weight: 400
        - asset: assets/fonts/LINESeedJP_A_TTF_Th.ttf
          weight: 300
        - asset: assets/fonts/LINESeedJP_A_TTF_Bd.ttf
          weight: 700
        - asset: assets/fonts/LINESeedJP_A_TTF_Eb.ttf
          weight: 800

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/icons/icon.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon.png"
